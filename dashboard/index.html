<!DOCTYPE html>
<html lang="en" class="dark" data-theme="black">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Git Analytics Dashboard</title>
    <!--
      PWA status bar colors. Two tags with media queries provide the correct
      initial color before JavaScript runs; the flash prevention script and
      AppContext theme effect overwrite both content attributes on every
      theme change so the active theme's color always wins regardless of
      OS preference.
      Values correspond to DaisyUI base-100 for lofi (#ffffff) and black
      (#000000) themes.
      See: docs/implementations/THEME_DARK_MODE.md
    -->
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)">
    <meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@300..900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="/assets/images/favicon.png" sizes="48x48">
    <link rel="icon" type="image/x-icon" href="/favicon.ico" sizes="32x32">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    <!--
      Theme flash prevention: classic script (not module) that runs synchronously
      during HTML parse — before any stylesheet or module loads. Reads the
      darkMode + lightTheme + darkTheme keys from localStorage, validates each
      theme name against a hardcoded allowlist (so a removed theme falls back
      to the default instead of producing an unstyled first paint), then
      applies BOTH .dark class (Tailwind dark: variant) AND data-theme
      attribute (DaisyUI semantic tokens) AND <meta name="theme-color">
      content before first paint. Falls back to system preference when no
      darkMode key is set.

      This script duplicates theme names and meta colors from
      dashboard/js/themes.js because inline scripts cannot import ES modules.
      The duplication is resolved automatically: the BEGIN/END GENERATED
      block below is rewritten by `scripts/generate-theme-meta.mjs` from
      `scripts/theme-config.js` on every `npm run dev` / `npm run build`,
      so drift is impossible — if anyone edits the generated block by hand
      the next build overwrites it.

      See: docs/implementations/THEME_DARK_MODE.md
           scripts/theme-config.js   (source of truth for the catalog)
           dashboard/js/themes.js     (module-level catalog, same BEGIN/END block)
    -->
    <script>
    (function() {
      /* BEGIN GENERATED: flash-prevention-meta */
      var LIGHT_THEMES = ['lofi', 'nord', 'emerald', 'caramellatte'];
      var DARK_THEMES = ['black', 'dim', 'coffee', 'dracula'];
      var DEFAULT_LIGHT_THEME = 'lofi';
      var DEFAULT_DARK_THEME = 'black';
      var META = {
        'lofi': '#ffffff',
        'nord': '#eceff4',
        'emerald': '#ffffff',
        'caramellatte': '#fff7ed',
        'black': '#000000',
        'dim': '#2a303c',
        'coffee': '#261b25',
        'dracula': '#282a36'
      };
/* END GENERATED: flash-prevention-meta */

      function validTheme(id, allowlist, fallback) {
        for (var i = 0; i < allowlist.length; i++) {
          if (allowlist[i] === id) return id;
        }
        return fallback;
      }

      try {
        var stored = localStorage.getItem('darkMode');
        var isDark = stored !== null
          ? stored === 'true'
          : window.matchMedia('(prefers-color-scheme: dark)').matches;

        var rawStored = isDark
          ? localStorage.getItem('darkTheme')
          : localStorage.getItem('lightTheme');
        var themeName = isDark
          ? validTheme(rawStored, DARK_THEMES, DEFAULT_DARK_THEME)
          : validTheme(rawStored, LIGHT_THEMES, DEFAULT_LIGHT_THEME);

        var root = document.documentElement;
        if (isDark) {
          root.classList.add('dark');
        } else {
          root.classList.remove('dark');
        }
        root.setAttribute('data-theme', themeName);

        var color = META[themeName] || '#808080';
        var metas = document.querySelectorAll('meta[name="theme-color"]');
        for (var i = 0; i < metas.length; i++) {
          metas[i].setAttribute('content', color);
        }
      } catch(e) {
        // localStorage unavailable — keep the defaults baked into the HTML
        // (class="dark" data-theme="black" + meta theme-color tags).
      }
    })();
    </script>
</head>
<body>
    <div id="root">
        <!-- Visible until React mounts; React.createRoot replaces this content -->
        <div style="display:flex;align-items:center;justify-content:center;min-height:100vh;flex-direction:column;gap:16px">
            <div style="width:36px;height:36px;border:3px solid #333;border-radius:50%;border-top-color:#2D68FF;animation:spin .8s linear infinite"></div>
            <p style="color:#767676;font-size:14px;font-family:system-ui,sans-serif">Loading dashboard&hellip;</p>
        </div>
        <!-- spin keyframes defined in styles.css; inline copy for pre-React loading spinner -->
        <style>@keyframes spin{to{transform:rotate(360deg)}}</style>
        <noscript><p style="color:#e5e7eb;text-align:center;padding:48px;font-family:system-ui,sans-serif">JavaScript is required to run this dashboard.</p></noscript>
    </div>
    <div id="heatmap-tooltip"></div>
    <div id="debug-root"></div>
    <!--
      Debug pill & loading timeout: inline script so it works even when the
      JS bundle fails to load. Captures errors, shows diagnostics, and warns
      the user if loading takes too long. The main.jsx bundle enhances this
      once it mounts (adds React component stacks, etc.).
      Skipped in embed mode (?embed=) — embedded charts shouldn't show debug UI.
    -->
    <script>
    (function() {
      if (new URLSearchParams(location.search).has('embed')) return;

      // --- Circular buffer event store (200 entries max) ---
      var MAX_ENTRIES = 200;
      var errors = [];
      var dismissed = false;
      var expanded = false;
      var banner = null;
      var loadTimerId = null;
      // Track whether the main JS bundle has mounted React
      window.__debugReactMounted = false;

      // Format epoch ms as HH:MM:SS for display in the inline pill
      function fmtTime(epoch) {
        var d = new Date(epoch);
        return d.getHours().toString().padStart(2,'0') + ':' +
               d.getMinutes().toString().padStart(2,'0') + ':' +
               d.getSeconds().toString().padStart(2,'0');
      }

      function pushError(msg, stack) {
        if (errors.length >= MAX_ENTRIES) errors.shift();
        // Store numeric epoch (Date.now) so debugLog.js bridge can preserve
        // the original error timestamp instead of using module-load time.
        // Matches spec: glow-props DEBUG_SYSTEM.md inline pill uses Date.now().
        errors.push({ time: Date.now(), message: msg, stack: stack || '' });
        dismissed = false;
        render();
      }

      // Expose for main.jsx to push React-specific errors (component stacks)
      window.__debugErrors = errors;
      window.__debugPushError = pushError;

      // --- Error listeners (work before JS bundle loads) ---
      window.addEventListener('error', function(e) {
        pushError(e.message || 'Unknown error', e.error && e.error.stack);
      });
      window.addEventListener('unhandledrejection', function(e) {
        var r = e.reason;
        pushError('Unhandled Promise: ' + (r && r.message || String(r)), r && r.stack);
      });

      // --- DOM helpers ---
      function el(tag, styles, text) {
        var node = document.createElement(tag);
        for (var k in styles) node.style[k] = styles[k];
        if (text) node.textContent = text;
        return node;
      }

      function getDiagnostics() {
        var sw = 'serviceWorker' in navigator;
        var standalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true;
        var ctrl = navigator.serviceWorker && navigator.serviceWorker.controller ? 'active' : 'none';
        return [
          'Network: ' + (navigator.onLine ? 'online' : 'OFFLINE'),
          'Service Worker support: ' + (sw ? 'yes' : 'no'),
          'SW controller: ' + ctrl,
          'Standalone mode: ' + standalone,
          'PWA installed flag: ' + (standalone || (function() { try { return localStorage.getItem('pwaInstalled') === 'true'; } catch(e) { return false; } })()),
          'React mounted: ' + !!window.__debugReactMounted,
          'Theme: ' + (document.documentElement.classList.contains('dark') ? 'dark' : 'light'),
          'Errors: ' + errors.length,
          'User agent: ' + navigator.userAgent,
        ].join('\n');
      }

      // --- Render the banner ---
      // zIndex 80 = --z-debug. Hardcoded because CSS vars aren't available
      // before stylesheets load. Keep in sync with --z-debug in styles.css.
      function render() {
        // Once React mounts and the React DebugPill takes over, stop updating
        // the inline banner DOM. The error listeners still fire (can't remove
        // from inside the IIFE), but this prevents wasted DOM operations on a
        // hidden element.
        if (window.__debugReactMounted) return;

        if (!banner) {
          banner = document.createElement('div');
          banner.id = 'debug-error-banner';
          banner.addEventListener('click', handleClick);
          document.body.appendChild(banner);
        }
        banner.textContent = '';

        var hasErrors = errors.length > 0;

        if (expanded) {
          // Expanded diagnostics / error log view
          var isErrorView = hasErrors;
          Object.assign(banner.style, {
            position:'fixed', bottom:'0', left:'0', right:'0', zIndex:'80',
            maxHeight:'40vh', overflow:'auto',
            background: isErrorView ? '#1a0000' : '#001a00',
            borderTop: '2px solid ' + (isErrorView ? '#ff4444' : '#4ade80'),
            fontFamily:'monospace', fontSize:'12px',
            color: isErrorView ? '#ff9999' : '#4ade80',
            padding:'0', display:'block',
          });
          var hdr = el('div', {display:'flex', justifyContent:'space-between', alignItems:'center', padding:'6px 12px', background: isErrorView ? '#2a0000' : '#002a00', position:'sticky', top:'0'});
          hdr.appendChild(el('span', {fontWeight:'bold', color: isErrorView ? '#ff6666' : '#4ade80'},
            isErrorView ? errors.length + ' error' + (errors.length !== 1 ? 's' : '') : 'Diagnostics'));
          var btns = el('div', {display:'flex', gap:'8px'});
          var copyBtn = el('button', {padding:'2px 10px', background: isErrorView ? '#ff4444' : '#16a34a', color:'#fff', border:'none', borderRadius:'3px', cursor:'pointer', fontSize:'11px'}, 'Copy');
          copyBtn.setAttribute('data-action', isErrorView ? 'copy-errors' : 'copy-diagnostics');
          var closeBtn = el('button', {padding:'2px 10px', background:'#333', color:'#ccc', border:'none', borderRadius:'3px', cursor:'pointer', fontSize:'11px'}, 'Close');
          closeBtn.setAttribute('data-action', 'collapse');
          btns.appendChild(copyBtn);
          btns.appendChild(closeBtn);
          hdr.appendChild(btns);
          banner.appendChild(hdr);

          var log = el('pre', {padding:'8px 12px', margin:'0', whiteSpace:'pre-wrap', wordBreak:'break-word'});
          log.id = isErrorView ? 'debug-error-log' : 'debug-info-log';
          if (isErrorView) {
            log.textContent = errors.map(function(e) {
              return '[' + fmtTime(e.time) + '] ' + e.message + (e.stack ? '\n' + e.stack : '');
            }).join('\n---\n');
          } else {
            log.textContent = getDiagnostics();
          }
          banner.appendChild(log);
        } else if (hasErrors) {
          // Collapsed error pill
          Object.assign(banner.style, {
            position:'fixed', bottom:'0', right:'0', left:'auto', zIndex:'80',
            maxHeight:'none', overflow:'visible', background:'transparent',
            borderTop:'none', fontFamily:'monospace', fontSize:'10px',
            color:'#ff6666', padding:'8px 12px',
            display: dismissed ? 'none' : 'block',
          });
          var pill = el('span', {background:'rgba(255,68,68,0.15)', border:'1px solid rgba(255,68,68,0.3)', borderRadius:'4px', padding:'3px 8px', color:'#ff6666', fontSize:'10px', cursor:'pointer'},
            errors.length + ' error' + (errors.length !== 1 ? 's' : ''));
          pill.setAttribute('data-action', 'expand');
          banner.appendChild(pill);
        } else {
          // Collapsed "0 errors" pill
          Object.assign(banner.style, {
            position:'fixed', bottom:'0', right:'0', left:'auto', zIndex:'80',
            maxHeight:'none', overflow:'visible', background:'transparent',
            borderTop:'none', fontFamily:'monospace', fontSize:'10px',
            color:'#4ade80', padding:'8px 12px',
            display: dismissed ? 'none' : 'block',
          });
          var pill = el('span', {background:'rgba(22,163,74,0.15)', border:'1px solid rgba(22,163,74,0.3)', borderRadius:'4px', padding:'3px 8px', color:'#4ade80', fontSize:'10px', cursor:'pointer'}, '0 errors');
          pill.setAttribute('data-action', 'show-diagnostics');
          banner.appendChild(pill);
        }
      }

      function handleClick(e) {
        var target = e.target.closest ? e.target.closest('[data-action]') : null;
        if (!target) return;
        var action = target.getAttribute('data-action');

        if (action === 'copy-errors') {
          var text = errors.map(function(e) { return '[' + fmtTime(e.time) + '] ' + e.message + '\n' + (e.stack || ''); }).join('\n---\n');
          navigator.clipboard.writeText(text).then(function() { target.textContent = 'Copied!'; setTimeout(function(){ target.textContent = 'Copy'; }, 1500); });
        } else if (action === 'copy-diagnostics') {
          var log = banner.querySelector('#debug-info-log');
          if (log) navigator.clipboard.writeText(log.textContent).then(function() { target.textContent = 'Copied!'; setTimeout(function(){ target.textContent = 'Copy'; }, 1500); });
        } else if (action === 'close') {
          dismissed = true;
          banner.style.display = 'none';
          expanded = false;
        } else if (action === 'collapse') {
          expanded = false;
          render();
        } else if (action === 'show-diagnostics') {
          expanded = true;
          render();
        } else if (action === 'expand') {
          expanded = true;
          render();
        }
      }

      // Create banner immediately
      render();

      // --- Loading timeout (20s) ---
      // Shows a warning if React hasn't mounted. Users see a helpful message
      // instead of an infinite spinner.
      loadTimerId = setTimeout(function() {
        if (window.__debugReactMounted) return;
        var root = document.getElementById('root');
        if (!root) return;
        var msg = root.querySelector('.loading-timeout-msg');
        if (msg) return;
        var warning = document.createElement('p');
        warning.className = 'loading-timeout-msg';
        warning.style.cssText = 'color:#f59e0b;font-size:13px;font-family:system-ui,sans-serif;text-align:center;max-width:400px;padding:0 16px';
        warning.textContent = 'This is taking longer than usual. Check the debug pill in the bottom-right corner for errors, or try reloading.';
        var flex = root.querySelector('div');
        if (flex) flex.appendChild(warning);
      }, 20000);

      // --- SW recovery (30s) ---
      // Requirement: Auto-recover from broken service worker serving corrupt assets
      // Approach: If React hasn't mounted after 30s, clear all caches, unregister SW,
      //   and reload. Limited to 2 attempts via sessionStorage to prevent infinite loops.
      //   The 30s window is intentionally longer than the 20s warning — gives user time
      //   to see the warning before auto-recovery kicks in.
      // Pattern from: synctone +html.tsx, few-lap +html.tsx
      // Alternatives considered:
      //   - Manual recovery only: Rejected — users may not know how to clear SW
      //   - Shorter timeout: Rejected — slow networks need time; 20s warning first
      setTimeout(function() {
        if (window.__debugReactMounted) return;
        // Only attempt recovery twice per session to prevent infinite reload loops
        var key = 'pwa-recovery-attempts';
        var attempts = 0;
        try { attempts = parseInt(sessionStorage.getItem(key) || '0', 10); } catch(e) {}
        if (attempts >= 2) return;
        try { sessionStorage.setItem(key, String(attempts + 1)); } catch(e) {}

        // Force SW update check — if a new SW is available, install it.
        // Watches updatefound for installing workers (not just already-waiting ones).
        // Pattern from: few-lap +html.tsx recovery script
        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.getRegistration().then(function(reg) {
            if (!reg) return;
            if (reg.waiting) {
              reg.waiting.postMessage({ type: 'SKIP_WAITING' });
            }
            reg.update().catch(function() {});
            // Watch for newly-installing workers triggered by update()
            reg.addEventListener('updatefound', function() {
              var w = reg.installing;
              if (!w) return;
              w.addEventListener('statechange', function() {
                if (w.state === 'installed') {
                  w.postMessage({ type: 'SKIP_WAITING' });
                }
              });
            });
          }).catch(function() {});

          // If still broken after the update attempt, nuclear option: clear everything
          setTimeout(function() {
            if (window.__debugReactMounted) return;
            if ('caches' in window) {
              caches.keys().then(function(names) {
                return Promise.all(names.map(function(n) { return caches.delete(n); }));
              }).catch(function() {});
            }
            navigator.serviceWorker.getRegistration().then(function(reg) {
              if (reg) reg.unregister();
            }).then(function() {
              window.location.reload();
            }).catch(function() {
              window.location.reload();
            });
          }, 3000);
        }
      }, 30000);

      // Let main.jsx signal when React is mounted
      window.__debugClearLoadTimer = function() {
        window.__debugReactMounted = true;
        if (loadTimerId) { clearTimeout(loadTimerId); loadTimerId = null; }
        // Clear recovery counter on successful mount (pattern from few-lap +html.tsx)
        try { sessionStorage.removeItem('pwa-recovery-attempts'); } catch(e) {}
      };
    })();
    </script>
    <!--
      PWA install prompt capture: Classic (non-module) script that runs
      synchronously during HTML parse — before any <script type="module">
      begins loading. On repeat visits with a cached service worker, the
      browser fires beforeinstallprompt before React mounts. This inline
      script stashes the event for pwa.js to consume later.
      See: glow-props CLAUDE.md "PWA Install Prompt Race Condition" pattern.
    -->
    <script>
    window.addEventListener('beforeinstallprompt', function(e) {
      e.preventDefault();
      window.__pwaInstallPromptEvent = e;
      // Diagnostic flag — lets hooks/debug check if event was ever received,
      // even after the event object has been consumed by pwa.js.
      // Pattern from: few-lap +html.tsx (__pwaPromptReceived)
      window.__pwaPromptReceived = true;
    });
    </script>
    <script type="module" src="./js/main.jsx"></script>
</body>
</html>
