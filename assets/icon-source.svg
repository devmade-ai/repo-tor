<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" shape-rendering="geometricPrecision">
  <!-- App icon source of truth — edit this, run `node scripts/generate-icons.mjs` to regenerate PNGs.
       Design rules for maskable icons:
       - Background fills entire 1024x1024 canvas (no transparency)
       - Important content within inner 80% (safe zone: 102-922 on each axis)
       - Must be legible at 48px (favicon) — no fine details
       - No gradients, opacity, glow, or fade — solid colors only for clean rasterization
       Palette: DaisyUI Dracula theme (default dark theme since 2026-04-16)
       Concept: Clean chart bars only — the app shows analytics, the icon shows analytics. -->

  <!-- Background — Dracula base-100 -->
  <rect width="1024" height="1024" rx="192" fill="#282a36"/>

  <!-- Grid lines (techy aesthetic) — Dracula neutral -->
  <g stroke="#414558" stroke-width="2">
    <line x1="256" y1="160" x2="256" y2="864"/>
    <line x1="512" y1="160" x2="512" y2="864"/>
    <line x1="768" y1="160" x2="768" y2="864"/>
    <line x1="160" y1="352" x2="864" y2="352"/>
    <line x1="160" y1="512" x2="864" y2="512"/>
    <line x1="160" y1="672" x2="864" y2="672"/>
  </g>

  <!-- Chart bars — 4 distinct Dracula semantic colors: purple, pink, cyan, orange
       Vertically centered: top=180, bottom=844, center=512 -->
  <rect x="208" y="500" width="128" height="344" rx="16" fill="#bd93f9"/>
  <rect x="368" y="300" width="128" height="544" rx="16" fill="#ff79c6"/>
  <rect x="528" y="180" width="128" height="664" rx="16" fill="#8be9fd"/>
  <rect x="688" y="380" width="128" height="464" rx="16" fill="#ffb86c"/>
</svg>
